<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelia - Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar" id="topbar"></div>
    <div id="pageContent"><p class="loading">Cargando...</p></div>
  </main>
  <div class="login-modal-overlay" id="loginModal">
    <div class="login-modal">
      <button class="login-modal-close" id="closeLoginModal"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

      <h3>Inicia sesión para continuar</h3>
      <p>Para agregar amigos necesitas una cuenta en Travelia.</p>
      <div class="login-modal-actions">
        <a href="login.html" class="btn-go-login">Iniciar sesión</a>
        <a href="register.html" class="btn-go-register">Crear cuenta gratis</a>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
