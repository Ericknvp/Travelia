<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travelia - Negocio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/topbar.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar" id="topbar"></div>
    <div id="pageContent"><p class="loading">Cargando...</p></div>
  </main>

  <!-- Modal: publicar como negocio -->
  <div class="login-modal-overlay" id="negPostModal">
    <div class="login-modal" style="max-width:520px;text-align:left;">
      <button class="login-modal-close" id="closeNegPost">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h3 style="margin-bottom:20px;">Nueva publicación del negocio</h3>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div><label class="form-label">Título</label><input class="form-input" id="negPostTitulo" placeholder="Título de la publicación"></div>
        <div><label class="form-label">Contenido</label><textarea class="form-input" id="negPostContenido" rows="4" placeholder="Describe tu oferta, novedad o experiencia..." style="resize:vertical;"></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="form-label">Categoría</label>
            <select class="form-input" id="negPostCategoria">
              <option value="tour">Tour</option>
              <option value="hospedaje">Hospedaje</option>
              <option value="restaurante">Restaurante</option>
              <option value="actividad">Actividad</option>
            </select>
          </div>
          <div><label class="form-label">Ciudad</label><input class="form-input" id="negPostCiudad" placeholder="Ej: Cartagena"></div>
        </div>
        <div>
          <label class="form-label">Foto</label>
          <input type="file" id="negPostFile" accept="image/*" style="display:none;">
          <div id="negPostFileArea" onclick="document.getElementById('negPostFile').click()" style="border:2px dashed var(--glass-border);border-radius:var(--radius-md);padding:20px;text-align:center;cursor:pointer;">
            <div id="negPostFilePlaceholder">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 6px;display:block;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <div style="font-size:12px;color:var(--text-muted);">Haz clic para subir una foto</div>
            </div>
            <div id="negPostFilePreview" style="display:none;">
              <img id="negPostPreviewImg" style="max-height:160px;border-radius:var(--radius-sm);object-fit:cover;">
              <div style="font-size:11px;color:var(--text-muted);margin-top:6px;" id="negPostFileName"></div>
            </div>
          </div>
        </div>
        <p id="negPostError" style="color:var(--accent-warm);font-size:13px;" hidden></p>
        <button class="btn-primary" id="btnSubmitNegPost" style="width:100%;justify-content:center;">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Publicar
        </button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/pages/negocio.js"></script>
</body>
</html>
